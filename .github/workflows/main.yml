name: Main

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dist
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  XPACK_ARM_TOOLCHAIN_VERSION: "13.2.1-1.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: octokeyz
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: openscopeproject/InteractiveHtmlBom
          ref: v2.9.0
          path: InteractiveHtmlBom

      - name: Install arm-none-eabi toolchain
        run: |
          wget \
            "https://github.com/xpack-dev-tools/arm-none-eabi-gcc-xpack/releases/download/v${XPACK_ARM_TOOLCHAIN_VERSION}/xpack-arm-none-eabi-gcc-${XPACK_ARM_TOOLCHAIN_VERSION}-linux-x64.tar.gz"{,.sha}

          sha256sum \
            --check \
            "xpack-arm-none-eabi-gcc-${XPACK_ARM_TOOLCHAIN_VERSION}-linux-x64.tar.gz.sha"

          tar \
            --extract \
            --verbose \
            --file="xpack-arm-none-eabi-gcc-${XPACK_ARM_TOOLCHAIN_VERSION}-linux-x64.tar.gz"

          echo "${{ github.workspace }}/xpack-arm-none-eabi-gcc-${XPACK_ARM_TOOLCHAIN_VERSION}/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:kicad/kicad-8.0-releases
          sudo apt update
          sudo apt install -y --no-install-recommends dfu-util kicad ninja-build

          # for older ubuntu versions the dfuse-pack script is shipped as an example
          if ! type -p dfuse-pack > /dev/null; then
            mkdir "${{ github.workspace }}/bin"

            gzip \
              --decompress \
              --stdout \
              /usr/share/doc/dfu-util/examples/dfuse-pack.py.gz \
            > "${{ github.workspace }}/bin/dfuse-pack.py"

            chmod +x "${{ github.workspace }}/bin/dfuse-pack.py"

            echo "${{ github.workspace }}/bin" >> $GITHUB_PATH
          fi

      - name: Build
        run: |
          cmake \
            -B ${{ github.workspace }}/build \
            -DGENERATE_IBOM=ON \
            -S ${{ github.workspace }}/octokeyz \
            -G Ninja

          cmake \
            --build ${{ github.workspace }}/build \
            --config Release \
            --target package \
            --target package_source

      - uses: actions/upload-artifact@v4
        with:
          name: ibom
          path: build/pcb/*.html

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: build/octokeyz-*

  website:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/configure-pages@v5

      - uses: actions/download-artifact@v4
        with:
          name: ibom
          path: prefix/ibom

      - uses: actions/upload-pages-artifact@v3
        with:
          path: prefix

  deploy-website:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: website
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  deploy-dist:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get release metadata
        id: meta
        run: |
          version="$(echo "${{ github.ref }}" | sed 's,refs/tags/v,,')"
          echo "name=$(git tag -l --format="%(contents:subject)" "v${version}")" >> $GITHUB_OUTPUT
          git tag -l --format="%(contents:body)" "v${version}" > body.txt

      - uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5
        with:
          name: ${{ steps.meta.outputs.name }}
          artifacts: "artifacts/octokeyz-*"
          bodyFile: body.txt
          generateReleaseNotes: true
